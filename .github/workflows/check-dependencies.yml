name: Check Dependency Files

on:
  push:
    branches: ["*"]
  pull_request:
    branches: [main, staging]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  check-deps:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: "4.3.3"
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get install -y libpq-dev

      - name: Set up renv
        uses: r-lib/actions/setup-renv@v2
        with:
          cache-version: 1

      - name: Check renv is in sync
        run: |
          Rscript -e '
            status <- renv::status()
            if (!isTRUE(status$synchronized)) {
              message("renv is out of sync. Please run renv::snapshot() locally and commit renv.lock.")
              quit(status = 1)
            }
          '
